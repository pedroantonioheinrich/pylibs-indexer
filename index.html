<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A melhor biblioteca de referência para comandos Python - PyLibs.">
    <meta name="description" content="Encontre comandos, exemplos de código e documentação simplificada para as melhores bibliotecas Python. O guia definitivo para desenvolvedores.">
    <meta name="keywords" content="Python, Bibliotecas, Programação, Dev, Referência, PyLibs, Data Science, Automação, Padrão, Biblioteca ">
    <meta name="author" content="Pedro Heinrich">
    <meta property="og:title" content="PyLibs - O Manual de Sobrevivência Python">
    <meta property="og:description" content="Comandos e exemplos prontos para as bibliotecas mais usadas do ecossistema Python.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pylibs.com.br">
    <meta property="og:image" content="https://pylibs.com.br/Styles/Images/og-image.png">
    <title>PyLibs | Referência Rápida de Bibliotecas Python</title>
    <link rel="icon" type="image/png" href="./Styles/Icons/favicon.ico">
    <link rel="apple-touch-icon" href="./Styles/Icons/icon.png">
    <style>
    /* GLOBAL */
    :root{
    --bg-color: #0f1729;
    --h1-color: #fac814;
    --p-color: #fff;
    --p2-color: #a6a6a6;
    --border-smooth: #a6a6a632;
    --elements-color: #18212f;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }


    body {
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        min-height: 100vh;
    }

    main{
        width: 100%;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
    }

    footer{
        width: 100%;
        background-color: #0f141c;
        display: block;
        justify-content: center;
        align-items: center;
        bottom: 0px;
        margin-top: 40px;
        padding: 20px;
    }
    footer p{
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--p2-color);
        font-size: 13px;
        
    }

    input:focus{
        outline: none;
    }

    header{
    height: 190px;
    width: 100dvw;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    margin-top: 20px;
    padding:0;
    }

    /* HEADER */
    #icon-img{
        width: 40px;
    }

    h1{
        color: var(--h1-color);
        font-size: 70px;
        font-weight: 900;
        margin-bottom: 10px;
        padding: 0;
    }
    h2{
        width: 29%;
        color: var(--p2-color);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 15px;
        font-weight: 100;
        text-align: center;
        

    }

    #manual-link-page{
        width: 250px;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 13px;
        border-radius: 10px;
        text-decoration: none;
        color: var( --h1-color);
        font-size: 14px;
        font-weight: 800;
        border: 1px solid var(--h1-color);
        box-shadow: 0 0 10px 0.1px var(--h1-color);
        margin: 15px;
    }


    @media (max-width: 768px) {
        h2{
            width: 90%;
            display: flex;
        }

    }

    /* SECTION CSS */

    /* --- SEÇÃO DE BUSCA E FILTROS --- */
    .section-tagindex-search {
        min-height: 160px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        position: relative; 
    }

    /* Container da Barra de Busca */
    .search-container {
        width: 40%;
        position: relative; 
        z-index: 100;
    }

    .search-bar-box-input {
        background-color: var(--elements-color);
        width: 100%; 
        height: 50px; 
        display: flex;
        justify-content: flex-start;
        align-items: center;
        border: 1px solid var(--border-smooth);
        border-radius: 10px;
        padding: 0 15px;
        margin-top: 10px;
        transition: all 0.3s ease;
    }

    .search-bar-box-input:focus-within {
        border-color: var(--h1-color);
        box-shadow: 0 0 18px 1px rgba(250, 200, 20, 0.31);
    }

    /* LISTA DE RESULTADOS (DROPDOWN) */
    .search-bar-box {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background-color: var(--elements-color);
        border: 1px solid var(--border-smooth);
        border-radius: 10px;
        margin-top: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        
        /* Efeito de Transição Suave */
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
    }

    /* Classe ativa controlada pelo JS */
    .search-bar-box.visible {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .ul-search-response {
        list-style: none;
        padding: 10px 0;
        margin: 0;
        max-height: 300px;
        overflow-y: auto;
    }

    .ul-search-response li a {
        display: flex;
        align-items: center;
        padding: 12px 20px;
        text-decoration: none;
        color: var(--p-color);
        gap: 15px;
        transition: background 0.2s;
    }

    .ul-search-response li a:hover {
        background-color: rgba(250, 200, 20, 0.1);
    }

    .ul-search-response .search-name {
        font-weight: 600;
    }

    .ul-search-response .search-cat {
        margin-left: auto;
        font-size: 11px;
        color: var(--p2-color);
        border: 1px solid var(--border-smooth);
        padding: 2px 8px;
        border-radius: 4px;
    }

    #search-icon {
        width: 20px;
        filter: brightness(0) invert(1);
        transform: scaleX(-1);
        rotate: 10deg;
        opacity: 0.5;
        transition: 0.3s;
    }

    #search-bar {
        background-color: transparent;
        width: 100%;
        height: 100%;
        padding-left: 15px;
        font-size: 18px; 
        color: var(--p-color);
        border: none;
        outline: none;
    }

    /* --- TAGS --- */
    .indexed-tags {
        width: 70%;
        min-height: 80px;
        padding: 15px;
        margin: 10px auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 4px; 
    }

    .tags, .tag-all {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: var(--elements-color);
        padding: 5px 15px; 
        border-radius: 30px;
        color: var(--p2-color);
        text-decoration: none;
        font-size: 13px;
        transition: all 0.3s ease;
        margin: 2px;
        cursor: pointer;
        border: 1px solid transparent; 
    }

    .tags:hover, .tag-all:hover {
        border: 1px solid var(--h1-color);
        box-shadow: 0 0 10px 0.1px var(--h1-color);
        transform: translateY(-2px);
    }

    .tags.active, .tag-all.active {
        background-color: var(--h1-color);
        color: var(--bg-color);
        font-weight: 800;
    }

    /* Contador de Libs */
    .how-many-libs {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        width: 100%;
        height: 40px;
        padding-left: 10%; 
    }

    .how-many-libs span { color: var(--h1-color); margin: 0 5px; font-weight: 800; }
    .how-many-libs p { color: var(--p2-color); font-size: 14px; }

    /* --- GRID DE CONTEÚDO --- */
    .content {
        width: 90%;
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        padding-bottom: 50px;
    }

    .card-container {
        background-color: var(--elements-color);
        height: 220px;
        width: 360px;
        margin: 5px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        border-radius: 10px;
        border: 1px solid var(--border-smooth);
        transition: all 0.3s ease;
        cursor: pointer;
        padding: 20px;
        text-decoration: none;
    }

    .card-container:hover {
        border: 1px solid var(--h1-color);
        box-shadow: 0 0 15px rgba(250, 200, 20, 0.2);
        transform: translateY(-5px);
    }

    .card-img { font-size: 35px; margin-bottom: 10px; }

    .card-name{
        color: var(--p-color);
        font-size: 18px;
        font-weight: 800;
    }

    .card-description {
        width: 100%;
        height: 6rem;
        margin: 10px 0;
    }

    .card-description p {
        color: var(--p2-color);
        font-size: 13px;
        line-height: 1.4;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
    }

    .card-tag-category {
        padding: 5px 15px;
        border-radius: 30px;
        color: var(--p2-color);
        font-size: 12px;
        border: 1px solid var(--border-smooth);
        transition: 0.3s;
    }

    /* --- OTIMIZAÇÃO MOBILE --- */
    @media (max-width: 768px) {
        .search-container {
            width: 90%; 
        }
        #search-bar {
            font-size: 12px;
            text-overflow: ellipsis;
        }

        .indexed-tags {
            width: 95%;
            gap: 2px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .tags, .tag-all {
            display: inline-flex;  
            width: auto;            
            padding: 8px 8px;      
            white-space: nowrap;    
            font-size: 12px;
            flex: 0 1 auto;
        }

        .how-many-libs {
            padding-left: 0;
            justify-content: center;
        }

        .card-container {
            width: 100%; 
            max-width: 380px;
        }
    }




    </style>
</head>
<body>
    <main>
        <header>
            <img id="icon-img" src="../Styles/Icons/icon.png" alt="Logo da linguagem Python">
            <h1 >PyLibs</h1>
            <h2>Seu guia rápido de bibliotecas Python.</h2>
            <h2>Consulte comandos, copie exemplos e aprenda na prática.</h2>
        </header>
        <section class="section-tagindex-search">
            <div class="search-container">
                <div class="search-bar-box-input">
                    <img id="search-icon" src="../Styles/Icons/search.png" alt="Ícone de lupa da barra de buscas">
                    <input type="text" id="search-bar" placeholder="Qual biblioteca de Python você quer consultar?">
                </div>
                <div class="search-bar-box">
                </div>
            </div>
            <div class="indexed-tags">
                <div class="tag-all">🚀 Ver Todas</div>
            </div>
        <div class="how-many-libs">
            <p><span>0</span> Biliotecas encontradas</p>
        </div>
        </section>
        <section class="content">
        </section>
        <footer>
            <p>PyLibs — O manual de sobrevivência do desenvolvedor Python.🐍</p>
            <p>Desenvolvido por Pedro Antônio Heinrich - @streetegist</p>
        </footer>
    </main>
    <script type="module" src="../Scripts/script.js" defer></script>
</body>
</html>
