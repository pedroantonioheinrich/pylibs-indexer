<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A melhor biblioteca de referência para comandos Python - PyLibs.">
    <meta name="description" content="Encontre comandos, exemplos de código e documentação simplificada para as melhores bibliotecas Python. O guia definitivo para desenvolvedores.">
   <meta name="keywords" content="Python, Bibliotecas, Programação, Dev, Referência, PyLibs, Data Science, Automação, Padrão, Biblioteca ">
    <meta name="author" content="Pedro Heinrich">
    <meta property="og:title" content="PyLibs - O Manual de Sobrevivência Python">
    <meta property="og:description" content="Comandos e exemplos prontos para as bibliotecas mais usadas do ecossistema Python.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pylibs.com.br">
    <meta property="og:image" content="https://pylibs.com.br/Styles/Images/og-image.png">
    <title>PyLibs - Detalhes da Biblioteca</title>
    <link rel="icon" type="image/png" href="./Styles/Icons/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="stylesheet" href="./Styles/details.css">
    <style>
    /* RESET E FONTES INDEPENDENTES */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;500&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --bg-color: #0f1729;
        --h1-color: #fac814;
        --p-color: #fff;
        --p2-color: #a6a6a6;
        --border-smooth: #a6a6a632;
        --elements-color: #18212f;
        --accent-green: #4ade80;
        
        /* Cores exclusivas para o Syntax Highlighting */
        --token-keyword: #ff79c6;
        --token-string: #f1fa8c;
        --token-function: #50fa7b;
        --token-comment: #6272a4;
        --token-number: #bd93f9;
    }

    body {
        background-color: var(--bg-color);
        color: var(--p-color);
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
    }

    /* TRANSIÇÃO GLOBAL PARA ELEMENTOS CLICÁVEIS */
    button, 
    .command-item, 
    .btn-back, 
    .install-pill,
    a {
        transition: all 0.2s ease-in-out;
    }

    /* LAYOUT PRINCIPAL */
    .details-container {
        display: flex;
        min-height: 100vh;
    }

    /* SIDEBAR (ESQUERDA) */
    .sidebar {
        width: 320px;
        background-color: #0f141c;
        border-right: 1px solid var(--border-smooth);
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        gap: 35px;
        position: sticky;
        top: 0;
        height: 100vh;
    }

    .btn-back {
        color: var(--p2-color);
        text-decoration: none;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-back:hover { 
        color: var(--p-color);
        transform: translateX(-4px);
    }

    #lib-name { 
        color: var(--h1-color);
        font-size: 1.5rem; 
        font-weight: 600; 
        margin: 5px;
    }


    /* SEÇÕES DA SIDEBAR */
    .setup-nav span, .commands-nav span {
        display: block;
        font-size: 0.75rem;
        font-weight: 800;
        color: var(--p2-color);
        margin-bottom: 12px;
        letter-spacing: 0.5px;
    }

    .install-pill {
        background: rgba(250, 200, 20, 0.05);
        border: 1px solid var(--h1-color);
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
    }

    .install-pill:hover {
        background: rgba(250, 196, 20, 0.12);
        transform: translateY(-2px);
    }

    .install-pill code {
        color: var(--h1-color);
        font-family: 'Fira Code', monospace;
        font-size: 0.85rem;
    }

    #commands-menu {
        max-height: 60vh;         
        overflow-y: auto;  
        overflow-x: auto;     
        padding-right: 5px;      
        
        list-style: none;
        margin: 0;
    }

    #commands-menu::-webkit-scrollbar {
        width: 4px;
        height: 4px;            
    }

    #commands-menu::-webkit-scrollbar-thumb {
        background: var(--h1-color); 
        border-radius: 10px;
    }

    #commands-menu::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
    }

    .command-item {
        padding: 12px 15px;
        color: var(--p2-color);
        cursor: pointer;
        border-radius: 6px;
        margin-bottom: 4px;
        font-size: 0.95rem;
        list-style: none;
    }

    .command-item:hover {
        background: var(--border-smooth);
        color: var(--p-color);
        padding-left: 20px;
    }

    .command-item.active {
        background: rgba(250, 200, 20, 0.1);
        color: var(--h1-color);
        border-left: 3px solid var(--h1-color);
    }

    .command-item:active {
        transform: scale(0.98);
    }

    /* CONTEÚDO PRINCIPAL (DIREITA) */
    .main-content {
        flex: 1;
        padding: 60px 80px;
        max-width: 1100px;
    }

    /* Animação para quando o conteúdo troca */
    @keyframes contentFadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    #command-display {
        animation: contentFadeIn 0.4s ease-out;
    }

    .import-hint {
        color: var(--p2-color);
        font-family: 'Fira Code', monospace;
        font-size: 0.9rem;
        letter-spacing: 1px;
    }

    #command-title {
        color: var(--p-color);
        font-size: 2.5rem;
        margin: 15px 0;
    }

    .lib-desc {
        color: var(--p2-color);
        line-height: 1.6;
        margin-bottom: 40px;
        font-size: 1.1rem;
    }

    /* CARD DE CÓDIGO (EDITOR) */
    .code-card {
        background: #0f141c;
        border: 1px solid var(--border-smooth);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .code-card-header {
        background: rgba(0,0,0,0.2);
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-smooth);
    }

    .mac-dots { display: flex; gap: 8px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .red { background: #ff5f56; }
    .yellow { background: #ffbd2e; }
    .green { background: #27c93f; }

    .code-body {
        display: flex;
        padding: 20px 0;
        font-family: 'Fira Code', monospace;
        font-size: 0.95rem;
    }

    .line-numbers {
        width: 50px;
        text-align: right;
        padding-right: 20px;
        color: var(--p2-color);
        opacity: 0.3;
        user-select: none;
        border-right: 1px solid var(--border-smooth);
    }

    /* Ajustes para Prism.js */
    pre[class*="language-"] {
        margin: 0 !important;
        padding: 0 20px !important;
        display: block;
        width: 100%;
        overflow-x: auto !important;
        background: transparent !important;
        box-sizing: border-box;
    }

    code[class*="language-"] {
        font-family: 'Fira Code', monospace !important;
        text-shadow: none !important;
        background: transparent !important;
        color: var(--p-color) !important;
    }

    /* Cores dos Tokens (Syntax Highlight) */
    .token.keyword { color: var(--token-keyword) !important; font-weight: bold; }
    .token.string { color: var(--token-string) !important; }
    .token.function { color: var(--token-function) !important; }
    .token.comment { color: var(--token-comment) !important; font-style: italic; }
    .token.number { color: var(--token-number) !important; }
    .token.operator { color: var(--p-color); }
    .token.class-name { color: var(--h1-color); }


    /* SAÍDA (TERMINAL) */
    .output-section { margin-top: 30px; }
    .output-label {
        display: block;
        margin-bottom: 15px;
        font-size: 0.9rem;
        color: var(--p2-color);
    }

    .output-box {
        background: #010409;
        border: 1px solid var(--border-smooth);
        padding: 25px;
        border-radius: 8px;
        color: var(--accent-green);
        font-family: 'Fira Code', monospace;
        font-size: 0.9rem;
        white-space: pre;          
        overflow-x:auto;         
        max-width: 100%;          
        display: block;

    }

    .output-box::-webkit-scrollbar, 
    pre[class*="language-"]::-webkit-scrollbar {
        height: 6px; /* Barra horizontal fininha */
    }

    .output-box::-webkit-scrollbar-track, 
    pre[class*="language-"]::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
    }

    .output-box::-webkit-scrollbar-thumb, 
    pre[class*="language-"]::-webkit-scrollbar-thumb {
        background: var(--h1-color); /* Usa o amarelo do seu tema */
        border-radius: 10px;
    }



    @media (max-width: 900px) {
        .sidebar {
            width: 260px; 
        }
        .main-content {
            padding: 40px; 
        }
    }

    @media (max-width: 768px) {
        /* 1. Container vira coluna */
        .details-container {
            flex-direction: column;
        }

        /* 2. Sidebar vira uma seção de topo */
        .sidebar {
            width: 100%;
            height: auto; /* Para de ocupar a tela toda */
            position: relative; /* Para de ser fixa na lateral */
            padding: 20px;
            gap: 20px;
            border-right: none;
            border-bottom: 1px solid var(--border-smooth);
        }

        /* 3. Menu de comandos em linha (Horizontal Scroll) */
        #commands-menu {
            display: flex;
            max-height: none;
            overflow-x: auto; /* Rola para os lados no dedão */
            overflow-y: hidden;
            gap: 10px;
            padding-bottom: 10px;
        }

        .command-item {
            white-space: nowrap; /* Não quebra linha no nome do comando */
            margin-bottom: 0;
        }

        /* 4. Conteúdo principal ocupa tudo */
        .main-content {
            padding: 30px 20px;
            max-width: 100%;
        }

        #command-title {
            font-size: 1.8rem; /* Diminui o título para não vazar */
        }

        /* 5. Ajuste nos cards de código */
        .code-body {
            font-size: 0.85rem; /* Fonte um pouco menor para mobile */
        }

        .line-numbers {
            width: 35px; /* Reduz a calha dos números */
            padding-right: 10px;
        }
    }
    </style>
</head>
<body>

    <main class="details-container">
        <aside class="sidebar">
            <a href="index.html" class="btn-back">← Voltar</a>
            
            <div class="lib-brand">
                <div id="lib-icon" class="lib-icon-display"></div>
                <h1 id="lib-name">Carregando...</h1>
            </div>

            <!-- <nav class="about-nav">
                <div class="about-item">
                    <span>>💡 SOBRE A LIB</span>
                    <div class="about-pill">
                        
                    </div>
                </div>
            </nav> -->

            <nav class="setup-nav">
                <div class="setup-item">
                    <span>>_ INSTALAÇÃO</span>
                    <div class="install-pill">
                        <code id="install-cmd">...</code>
                    </div>
                </div>
            </nav>

            <nav class="commands-nav">
                <span> 📖 COMANDOS</span>
                <ul id="commands-menu">
                    </ul>
            </nav>
        </aside>

        <section class="main-content">
            <header class="content-header">
                <code id="import-cmd" class="import-hint"></code>
                <h2 id="command-title">Selecione um comando</h2>
                <p id="lib-description" class="lib-desc"></p>
            </header>

            <div id="command-display" class="display-area">
                </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="./Scripts/details.js" type="module"></script>
</body>
</html>
